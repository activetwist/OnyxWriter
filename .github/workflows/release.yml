name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTarget: "aarch64-apple-darwin"
          - name: Linux x64 packages
            platform: ubuntu-22.04
            args: "--bundles deb,rpm"
            rustTarget: ""
          - name: Windows x64 packages
            platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rustTarget: "x86_64-pc-windows-msvc"
          - name: Windows ARM64 packages
            platform: windows-11-arm
            args: "--target aarch64-pc-windows-msvc"
            rustTarget: "aarch64-pc-windows-msvc"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: |
          npm run typecheck
          npm run test
          npm run build
          npm run license:check
          npm audit --audit-level=high

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Onyx Writer ${{ github.ref_name }}"
          releaseBody: "See release notes and assets for this Onyx Writer build."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
